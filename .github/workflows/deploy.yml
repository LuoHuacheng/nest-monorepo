name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmmirror.com'

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build --filter=!@match/api-client

      - name: Copy files to server
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -i ${{ secrets.SERVER_SSH_KEY }}" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='apps/api/src' \
            --exclude='apps/admin/src' \
            --exclude='dist' \
            --exclude='.turbo' \
            --exclude='.claude' \
            --exclude='docs' \
            --exclude='*.md' \
            --exclude='.env*' \
            --exclude='lefthook.yml' \
            --exclude='turbo.json' \
            --exclude='tsconfig.json' \
            --exclude='vitest.config.ts' \
            --exclude='*.lock' \
            --exclude='pnpm-workspace.yaml' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/match/

      - name: Run Prisma Migrate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/match
            pnpm install --frozen-lockfile
            pnpm prisma migrate deploy

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/match
            pm2 delete all || true
            pm2 start ecosystem.config.js
            pm2 save

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            pm2 list
            curl -s http://localhost:4001/health || echo "API not ready"
            curl -s http://localhost:4000/ | head -c 100 || echo "Admin not ready"